spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600
      routes:
        - id: order-service
          uri: http://order-service:8081
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: http://payment-service:8082
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

        - id: inventory-service
          uri: http://inventory-service:8083
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

        - id: order-service-docs
          uri: http://order-service:8081
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - RewritePath=/v3/api-docs/order-service, /v3/api-docs

        - id: payment-service-docs
          uri: http://payment-service:8082
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - RewritePath=/v3/api-docs/payment-service, /v3/api-docs

        - id: inventory-service-docs
          uri: http://inventory-service:8083
          predicates:
            - Path=/v3/api-docs/inventory-service
          filters:
            - RewritePath=/v3/api-docs/inventory-service, /v3/api-docs

        - id: notification-service-docs
          uri: http://notification-service:8084
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: Order Service
        url: /v3/api-docs/order-service
      - name: Payment Service
        url: /v3/api-docs/payment-service
      - name: Inventory Service
        url: /v3/api-docs/inventory-service
      - name: Notification Service
        url: /v3/api-docs/notification-service

jwt:
  secret: ${JWT_SECRET:my-default-secret-key-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.gateway.filter: DEBUG
